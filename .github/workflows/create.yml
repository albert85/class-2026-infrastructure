name: Terraform Deployment

on:
    workflow_dispatch:
    push:
        branches:
            - main

jobs:
    terraform:
        name: 'Terraform Apply'
        runs-on: ubuntu-latest
        env:
            DESTROY: ${{ secrets.DESTROY }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3
            
            - name: Setup AWS CLI
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: 'eu-north-1'

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: 1.6.6

            - name: Terraform Init
              working-directory: terraform
              run: terraform init
            
            - name: Terraform validate
              working-directory: terraform
              run: terraform validate
            
            - name: Terraform Plan
              working-directory: terraform
              run: terraform plan -var-file="dev.tfvars"

            - name: Terraform Apply
              id: apply
              working-directory: terraform
              run: terraform apply -var-file="dev.tfvars" -auto-approve

            - name: Update DuckDNS
              if: ${{ env.DESTROY != 'true' }}
              run: |
                # 1. Get the ALB DNS name from Terraform output
                # Assumes you have an output named 'alb_dns_name' in your TF files
                ALB_URL=$(cd terraform && terraform output -raw alb_dns_name)
                
                # 2. Resolve DNS to IP (ALBs usually return multiple IPs; we'll take the first one)
                ALB_IP=$(dig +short $ALB_URL | head -n1)
                
                echo "Updating DuckDNS for domain ${{ secrets.DUCKDNS_DOMAIN }} with IP $ALB_IP"
                
                # 3. Push to DuckDNS
                curl -s "https://www.duckdns.org/update?domains=${{ secrets.DUCKDNS_DOMAIN }}&token=${{ secrets.DUCKDNS_TOKEN }}&ip=$ALB_IP"
              
            - name: Terraform Destroy
              if: ${{ env.DESTROY == 'true' }}
              working-directory: terraform
              run: terraform destroy -var-file="dev.tfvars" -auto-approve