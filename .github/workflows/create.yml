name: Terraform and Ansible Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  terraform:
    name: 'Infrastructure and Configuration'
    runs-on: ubuntu-latest
    env:
      DESTROY: ${{ secrets.DESTROY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for latest node support

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'eu-north-1'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false # Required to easily capture outputs in scripts

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Terraform Apply
        id: apply
        working-directory: terraform
        run: |
          terraform apply -var-file="dev.tfvars" -auto-approve
          # Exporting outputs for the Ansible step
          echo "ALB_DNS=$(terraform output -raw alb_dns)" >> $GITHUB_ENV
          echo "BASTION_IP=$(terraform output -raw ansible_node_ip)" >> $GITHUB_ENV
          echo "APP_PRIVATE_IP=$(terraform output -raw app_private_ip)" >> $GITHUB_ENV

      # --- ANSIBLE SECTION ---

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Disable strict host checking so the runner doesn't hang
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          DUCKDNS_DOMAIN: "user-demo" # Change this to your subdomain name
        run: |
          # We pass the IPs and DNS names directly into Ansible as extra-vars
          ansible-playbook -i "${{ env.APP_PRIVATE_IP }}," deploy_fastapi.yml \
            --user ubuntu \
            --ssh-common-args="-o ProxyJump=ubuntu@${{ env.BASTION_IP }}" \
            --extra-vars "alb_dns_name=${{ env.ALB_DNS }} duckdns_token=$DUCKDNS_TOKEN duckdns_domain=$DUCKDNS_DOMAIN"

      # --- CLEANUP SECTION ---

      - name: Terraform Destroy
        if: ${{ env.DESTROY == 'true' }}
        working-directory: terraform
        run: terraform destroy -var-file="dev.tfvars" -auto-approve